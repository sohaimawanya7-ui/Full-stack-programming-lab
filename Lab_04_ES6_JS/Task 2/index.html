<!DOCTYPE html>
<html>
<head>
    <title>Animated Image Gallery</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<div class="container">
    <h2>Animated Image Gallery</h2>

    <div class="gallery">
        <img id="galleryImage" src="https://picsum.photos/id/1015/700/400">
        <div class="caption" id="caption">Mountain Landscape</div>
    </div>

    <div class="buttons">
        <button id="prev">Previous</button>
        <button id="next">Next</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
