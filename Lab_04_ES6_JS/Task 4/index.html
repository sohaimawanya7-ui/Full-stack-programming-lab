<!DOCTYPE html>
<html>
<head>
    <title>Tabbed Content</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<div class="container">
    <h2>Tabbed Content Section</h2>

    <div class="tabs">
        <button class="tab-link" data-target="tab1">Home</button>
        <button class="tab-link" data-target="tab2">About</button>
        <button class="tab-link" data-target="tab3">Services</button>
        <button class="tab-link" data-target="tab4">Contact</button>
    </div>

    <div class="tab-content" id="tab1">Welcome to Home Section</div>
    <div class="tab-content" id="tab2">About Us Content Here</div>
    <div class="tab-content" id="tab3">Our Services Information</div>
    <div class="tab-content" id="tab4">Contact Details Here</div>
</div>

<script src="script.js"></script>
</body>
</html>
